<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Mode | Task Agent</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="main-container">
    <div class="chat-card mode-card">
        <h2 class="title">How Would You Like to <br> Manage Today?</h2>
        <div class="mode-buttons">
            <button class="primary-btn" onclick="autonomousMode()">
                Smart Mode<small>Let the Agent Decide</small>
            </button>
            <button class="primary-btn" onclick="humanMode()">
                Contol Mode<small>I'll Manage It</small>
            </button>
        </div>
    </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
