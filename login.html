<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Task Agent</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="main-container">
    <div class="chat-card">
        <h2 class="title">Login</h2>
        <div class="form-center">
            <input 
                class="input-box"
                id="loginUser"
                type="text"
                placeholder="Username"
            >
            <input 
                class="input-box"
                id="loginPass"
                type="password"
                placeholder="Password"
            >
            <button class="primary-btn" onclick="loginUser()">
                Login
            </button>
            <p>
                Don't have account?
                <a href="signup.html" style="color:#c4b5fd">
                    Signup
                </a>
            </p>
        </div>
    </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
